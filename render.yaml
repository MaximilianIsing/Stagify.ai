services:
  - type: web
    name: stagify-ai
    env: node
    plan: standard
    buildCommand: sh scripts/build.sh
    startCommand: sh scripts/start.sh
    # For envVars, check docs/reference/environment-variables.md
    disk:
      name: stagify-data
      mountPath: /data
      sizeGB: 1
    autoDeploy: false
