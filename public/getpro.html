<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/webp" sizes="64x64" href="media-webp/logo/Pro64x64.webp" />
    <title>Activate Stagify+</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #eef3ff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
        color: #0f172a;
        padding: 24px;
        box-sizing: border-box;
      }
      .gp {
        width: 100%;
        max-width: 380px;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        box-shadow: 0 18px 48px -18px rgba(15, 23, 42, 0.3);
        padding: 28px 24px;
        text-align: center;
      }
      .gp img { width: 48px; height: 48px; }
      .gp h1 { font-size: 1.25rem; margin: 14px 0 6px; }
      .gp p { color: #51607a; font-size: 0.9375rem; line-height: 1.5; margin: 0 0 16px; }
      .gp form { display: none; flex-direction: column; gap: 10px; margin-top: 8px; }
      .gp input {
        width: 100%;
        padding: 0.65rem 0.85rem;
        font: inherit;
        color: #0f172a;
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        box-sizing: border-box;
      }
      .gp input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12); }
      .gp button {
        padding: 0.7rem 1rem;
        font: inherit;
        font-weight: 700;
        color: #fff;
        background: #2563eb;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }
      .gp button:hover { background: #1d4ed8; }
      .gp .links { display: none; margin-top: 14px; }
      .gp .links a { color: #2563eb; text-decoration: none; }
      .gp .err { color: #b91c1c; }
      .gp .ok { color: #047857; }
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    </style>
  </head>
  <body>
    <main class="gp">
      <img src="media-webp/logo/Pro64x64.webp" alt="" />
      <h1>Activate Stagify+</h1>
      <p id="gp-status">Checking…</p>
      <form id="gp-form" autocomplete="off">
        <label for="gp-key" class="sr-only">Access key</label>
        <input type="password" id="gp-key" placeholder="Access key" autocomplete="off" spellcheck="false" />
        <button type="submit">Activate Stagify+</button>
      </form>
      <p class="links" id="gp-links"><a href="/">Home</a> &middot; <a href="/stagify-plus.html">Stagify+</a></p>
    </main>

    <script>
      (function () {
        'use strict';
        var TOKEN_KEY = 'stagifyAuthToken';
        var statusEl = document.getElementById('gp-status');
        var form = document.getElementById('gp-form');
        var keyInput = document.getElementById('gp-key');
        var links = document.getElementById('gp-links');

        function getToken() {
          try { return localStorage.getItem(TOKEN_KEY); } catch (e) { return null; }
        }

        // Read the admin key from the URL fragment (#key=...). Fragments are never
        // sent to the server, so they don't appear in access logs or Referer headers.
        function keyFromHash() {
          var h = location.hash || '';
          var m = /(?:^#|&)key=([^&]+)/.exec(h);
          return m ? decodeURIComponent(m[1]) : '';
        }

        // Drop the fragment so the secret doesn't linger in the address bar / history.
        function clearHash() {
          try { history.replaceState(null, '', location.pathname); } catch (e) {}
        }

        function setStatus(msg, cls) {
          statusEl.textContent = msg;
          statusEl.className = cls || '';
        }

        function grant(key) {
          var token = getToken();
          if (!token) {
            setStatus('Sign in on this site first, then reopen this link.', 'err');
            return;
          }
          setStatus('Activating…');
          fetch('/api/getpro', {
            method: 'POST',
            headers: {
              'X-Stagify-Endpoint-Key': key,
              Authorization: 'Bearer ' + token,
            },
          })
            .then(function (r) {
              return r.json().then(function (j) { return { ok: r.ok, body: j }; });
            })
            .then(function (res) {
              if (res.ok && res.body && res.body.ok) {
                setStatus('Your account now has Stagify+.', 'ok');
                form.style.display = 'none';
                links.style.display = 'block';
              } else {
                setStatus((res.body && res.body.error) || 'Activation failed.', 'err');
                form.style.display = 'flex';
              }
            })
            .catch(function () {
              setStatus('Network error. Please try again.', 'err');
              form.style.display = 'flex';
            });
        }

        form.addEventListener('submit', function (e) {
          e.preventDefault();
          var k = keyInput.value.trim();
          if (k) grant(k);
        });

        var hashKey = keyFromHash();
        clearHash();

        if (!getToken()) {
          setStatus('Sign in on this site first, then reopen this link.', 'err');
          return;
        }
        if (hashKey) {
          grant(hashKey);
        } else {
          setStatus('Enter your access key to activate Stagify+.');
          form.style.display = 'flex';
        }
      })();
    </script>
  </body>
</html>
