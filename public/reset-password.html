<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/webp" sizes="32x32" href="media-webp/logo/Logo32x32.webp">
    <title>Reset password — Stagify</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/auth.css">
    <link rel="stylesheet" href="styles/reset-password.css">
  </head>
  <body style="background: #b2c4f6; min-height: 100vh;">
    <main class="reset-page">
      <div class="reset-card">
        <h1>Set a new password</h1>
        <p>Choose a password with at least 8 characters.</p>
        <div id="reset-error" class="auth-error" role="alert"></div>
        <div id="reset-success" class="auth-error" style="color: #15803d; min-height: 1.2em;" role="status"></div>
        <form id="reset-form" novalidate>
          <div class="auth-field">
            <label for="reset-password">New password</label>
            <input type="password" id="reset-password" name="password" autocomplete="new-password" required minlength="8" placeholder="At least 8 characters">
          </div>
          <div class="auth-field">
            <label for="reset-password-confirm">Confirm password</label>
            <input type="password" id="reset-password-confirm" autocomplete="new-password" required minlength="8" placeholder="Re-enter password">
          </div>
          <div class="auth-actions">
            <button type="submit" class="btn btn-primary btn-lg" id="reset-submit"><strong>Update password</strong></button>
          </div>
        </form>
        <p style="margin-top: 20px; text-align: center; font-size: 14px;">
          <a href="index.html">Back to Stagify</a>
        </p>
      </div>
    </main>
    <script type="module" src="scripts/reset-password.js"></script>
  </body>
</html>
