<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/webp" sizes="32x32" href="media-webp/logo/Logo32x32.webp">
    <title>Reset password — Stagify</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/auth.css">
    <style>
      .reset-page {
        max-width: 420px;
        margin: 0 auto;
        padding: 48px 20px 80px;
      }
      .reset-card {
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(37, 99, 235, 0.2);
        border-radius: 16px;
        padding: 28px 22px;
        box-shadow: 0 12px 40px rgba(30, 58, 138, 0.12);
      }
      .reset-card h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
        color: #1e3a8a;
        text-align: center;
      }
      .reset-card > p {
        margin: 0 0 20px;
        font-size: 14px;
        color: #6b7280;
        text-align: center;
        line-height: 1.45;
      }
    </style>
  </head>
  <body style="background: #b2c4f6; min-height: 100vh;">
    <main class="reset-page">
      <div class="reset-card">
        <h1>Set a new password</h1>
        <p>Choose a password with at least 8 characters.</p>
        <div id="reset-error" class="auth-error" role="alert"></div>
        <div id="reset-success" class="auth-error" style="color: #15803d; min-height: 1.2em;" role="status"></div>
        <form id="reset-form" novalidate>
          <div class="auth-field">
            <label for="reset-password">New password</label>
            <input type="password" id="reset-password" name="password" autocomplete="new-password" required minlength="8" placeholder="At least 8 characters">
          </div>
          <div class="auth-field">
            <label for="reset-password-confirm">Confirm password</label>
            <input type="password" id="reset-password-confirm" autocomplete="new-password" required minlength="8" placeholder="Re-enter password">
          </div>
          <div class="auth-actions">
            <button type="submit" class="btn btn-primary btn-lg" id="reset-submit"><strong>Update password</strong></button>
          </div>
        </form>
        <p style="margin-top: 20px; text-align: center; font-size: 14px;">
          <a href="index.html">Back to Stagify</a>
        </p>
      </div>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token') || '';
        var form = document.getElementById('reset-form');
        var errEl = document.getElementById('reset-error');
        var okEl = document.getElementById('reset-success');
        var submitBtn = document.getElementById('reset-submit');
        if (!token) {
          if (errEl) errEl.textContent = 'Invalid or missing reset link. Request a new one from the sign-in screen.';
          if (form) form.style.display = 'none';
          return;
        }
        form.addEventListener('submit', async function (e) {
          e.preventDefault();
          var p1 = document.getElementById('reset-password').value;
          var p2 = document.getElementById('reset-password-confirm').value;
          if (errEl) errEl.textContent = '';
          if (okEl) okEl.textContent = '';
          if (p1 !== p2) {
            if (errEl) errEl.textContent = 'Passwords do not match.';
            return;
          }
          if (p1.length < 8) {
            if (errEl) errEl.textContent = 'Password must be at least 8 characters.';
            return;
          }
          submitBtn.disabled = true;
          try {
            var r = await fetch('/api/auth/reset-password', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token: token, password: p1 }),
            });
            var data = await r.json().catch(function () {
              return {};
            });
            if (!r.ok) {
              if (errEl) errEl.textContent = data.error || 'Could not reset password.';
              submitBtn.disabled = false;
              return;
            }
            if (okEl) okEl.textContent = 'Password updated. You can sign in now.';
            form.style.display = 'none';
          } catch (err) {
            if (errEl) errEl.textContent = 'Network error. Try again.';
            submitBtn.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
